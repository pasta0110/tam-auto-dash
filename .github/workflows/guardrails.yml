name: Guardrails

on:
  push:
    branches: [main]
  pull_request:

jobs:
  reliability-and-perf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile checks
        run: |
          python -m py_compile app.py data_loader.py data_processor.py ch_NEW_smart_uploader.py
          python -m py_compile services/data_contract.py services/aggregations.py services/prediction_ops.py services/map_ops.py services/tab1_summary_ops.py services/analytics_pack.py services/pipeline_cache.py
          python -m py_compile tools/reliability_guard.py tools/perf_guard.py tools/uploader_watchdog.py
          python -m py_compile tabs/tab1_summary.py tabs/tab1_5/views.py tabs/tab2/views.py tabs/tab3_prediction.py tabs/tab4_validation.py tabs/tab5_map.py

      - name: Reliability guard
        run: python tools/reliability_guard.py --strict

      - name: Perf guard
        run: python tools/perf_guard.py --loops 3 --max-tab2-total 6.5

      - name: Unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Telegram notify success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets are missing, skip notify."
            exit 0
          fi
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          MSG="✅ 통과 | ${GITHUB_REPOSITORY} | ${GITHUB_REF_NAME} | ${SHORT_SHA}"
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}")
          echo "Telegram response: $RESP"
          echo "$RESP" | grep -q '"ok":true'

      - name: Telegram notify failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets are missing, skip notify."
            exit 0
          fi
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          MSG="🚨 실패 | ${GITHUB_REPOSITORY} | ${GITHUB_REF_NAME} | ${SHORT_SHA}"
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}")
          echo "Telegram response: $RESP"
          echo "$RESP" | grep -q '"ok":true'
