name: Guardrails

on:
  push:
    branches: [main]
  pull_request:

jobs:
  reliability-and-perf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile checks
        run: |
          python -m py_compile app.py data_loader.py data_processor.py
          python -m py_compile services/data_contract.py services/aggregations.py
          python -m py_compile tools/reliability_guard.py tools/perf_guard.py

      - name: Reliability guard
        run: python tools/reliability_guard.py --strict

      - name: Perf guard
        run: python tools/perf_guard.py --max-tab2-total 8.0

      - name: Telegram notify success
        if: success() && secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != ''
        run: |
          MSG="✅ Guardrails 통과\nrepo=${{ github.repository }}\nbranch=${{ github.ref_name }}\ncommit=${{ github.sha }}\nrun=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${MSG}" >/dev/null

      - name: Telegram notify failure
        if: failure() && secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != ''
        run: |
          MSG="🚨 Guardrails 실패\nrepo=${{ github.repository }}\nbranch=${{ github.ref_name }}\ncommit=${{ github.sha }}\nrun=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${MSG}" >/dev/null
